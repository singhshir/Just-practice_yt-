<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body>
    <form>
        <label for="username"> username</label>
        <input type="text" id="username" name="username" placeholder="enter your full name"  required>
        <br>
        <label for="email"> email</label>
        <input type="email" id="email" name="email" placeholder="enter your email" required>
        <br>
        <label for="password"> password</label> 
        <input type="password" id="password" name="password" placeholder="enter your password" required>
        <br><label for="gender"> gender</label>
        <select id="gender" name="gender" required>
            <option value="">Select your gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select>
        <br>
        <label for ="hobbies"> hobbies </label>
        <br>
        <input type="checkbox" id="reading" name="hobbies" value="reading">Reading
        <input type="checkbox" id="swimming" name="hobbies" value="swimming">Swimming   
        <input type="checkbox" id="dancing" name="hobbies" value="dancing">Dancing
        <input type="checkbox" id="travling" name="hobbies" value="travling">travling
        <input type="checkbox" id="other" name="hobbies" value="other">other
        <label for="DOB">date of birth</label>
        <input type="date" id="DOB" name="DOB" required>
        <br>
        <label for="phone number">phone number</label>
        <input type="tel" id="phone number" name="phone number" placeholder="enter your phone number" required>
        <br>
        <label for="country">country</label>
        <select id="country" name="country" required>
            <option value="">Select your country</option>
            <option value="usa">USA</option>
            <option value="canada">Canada</option>
            <option value="uk">UK</option>
            <option value="australia">Australia</option>
            <option value="other">Other</option>
        </select>
        <br>
        <input type="submit" value="submit">        
    </form>
    
</body>
</html>
