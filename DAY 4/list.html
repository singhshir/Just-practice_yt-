<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list</title>
</head>
<body>
    <h1>Order list</h1>
    <ol type="1">
        <li>item 1</li>
        <li>item 2</li>
        <li>item 3</li>
    </ol>
    <ol type="i">
        <li>item 1</li>
        <li>item 2</li>
        <li>item 3</li>
    </ol>
     <ol type="A">
        <li>item 1</li>
        <li>item 2</li>
        <li>item 3</li>
    </ol>


    <h1>Unordered list</h1>
    <ul type="square">
        <li>item 1</li>
        <li>item 2</li>
        <li>item 3</li>
    </ul>
    <ul type="circle">
        <li> item 1 <li>
        <li> item 2 </li>
        <li> item 3</li>
        </li>

        <h1>Definition list</h1>
        <dl>
            <dt>Term 1</dt>
            <dd>Definition 1</dd>
            <dt>Term 2</dt>
            <dd>Definition 2</dd>
        </dl>
</body>
</html>
