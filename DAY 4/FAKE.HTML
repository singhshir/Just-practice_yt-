<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage Mockup</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Top Navigation */
        header {
            display: flex;
            justify-content: flex-end;
            padding: 15px 20px;
            gap: 15px;
            align-items: center;
        }

        header a {
            text-decoration: none;
            color: #000;
            font-size: 13px;
        }

        header a:hover {
            text-decoration: underline;
        }

        .avatar {
            background: #7b1fa2;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        /* Main Search Area */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: -50px; /* Offset for visual balance */
        }

        .logo {
            font-size: 80px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        /* Multi-colored logo letters */
        .g { color: #4285F4; }
        .r { color: #EA4335; }
        .y { color: #FBBC05; }
        .g2 { color: #4285F4; }
        .l { color: #34A853; }
        .e { color: #EA4335; }

        .search-container {
            width: 100%;
            max-width: 580px;
            position: relative;
        }

        .search-bar {
            width: 100%;
            padding: 12px 20px;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }

        .search-bar:hover, .search-bar:focus {
            box-shadow: 0 1px 6px rgba(32,33,36,.28);
            border-color: rgba(223,225,229,0);
        }

        .button-group {
            margin-top: 30px;
            display: flex;
            gap: 12px;
        }

        button {
            background-color: #f8f9fa;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            color: #3c4043;
            font-size: 14px;
            padding: 0 16px;
            line-height: 36px;
            min-width: 54px;
            cursor: pointer;
        }

        button:hover {
            border: 1px solid #dadce0;
            color: #202124;
        }

        /* Footer */
        footer {
            background: #f2f2f2;
            color: #70757a;
            font-size: 14px;
        }

        .footer-top {
            padding: 15px 30px;
            border-bottom: 1px solid #dadce0;
        }

        .footer-bottom {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
        }

        .footer-links {
            display: flex;
            gap: 25px;
        }
    </style>
</head>
<body>

    <header>
        <a href="#">Gmail</a>
        <a href="#">Images</a>
        <div class="avatar">G</div>
    </header>

    <main>
        <div class="logo">
            <span class="g">S</span><span class="r">o</span><span class="y">o</span><span class="g2">g</span><span class="l">l</span><span class="e">e</span>
        </div>
        <div class="search-container">
            <input type="text" class="search-bar" autofocus>
        </div>
        <div class="button-group">
            <button>Google Search</button>
            <button>I'm Feeling Lucky</button>
        </div>
    </main>

    <footer>
        <div class="footer-top">United States</div>
        <div class="footer-bottom">
            <div class="footer-links">
                <span>About</span>
                <span>Advertising</span>
                <span>Business</span>
                <span>How Search works</span>
            </div>
            <div class="footer-links">
                <span>Privacy</span>
                <span>Terms</span>
                <span>Settings</span>
            </div>
        </div>
    </footer>

</body>
</html>
